name: Scheduled Auto Bug Fixer

on:
  schedule:
    - cron: '0 * * * *'  # Every hour
  workflow_dispatch:

permissions:
  issues: write

jobs:
  trigger-auto-bug-fixer:
    name: Trigger auto-bug-fixer agent
    runs-on: ubuntu-latest
    steps:
      - name: Create issue to trigger auto-bug-fixer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "Scheduled: Auto Bug Fixer $(date +'%Y-%m-%d %H:%M UTC')" \
            --body "@copilot /auto-bug-fixer Please scan the codebase for bugs and fix any issues you find."
