name: Scheduled Auto Bug Fixer

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  run-auto-bug-fixer:
    name: Run auto-bug-fixer agent
    runs-on: ubuntu-latest
    steps:
      - uses: github/copilot-cloud-agents@v1
        with:
          agent: auto-bug-fixer
          github_token: ${{ secrets.GITHUB_TOKEN }}
