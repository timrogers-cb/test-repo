name: Joker - Hourly

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  run-agent:
    name: Run Joker agent
    runs-on: ubuntu-latest
    steps:
      - uses: github/copilot-coding-agent@v1
        with:
          agent_file: .github/agents/joker.md
