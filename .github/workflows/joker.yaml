name: Joker (Scheduled)

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  issues: write

jobs:
  trigger-joker:
    name: Trigger joker agent
    runs-on: ubuntu-latest
    steps:
      - name: Create issue for joker agent
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "Joker: scheduled run $(date -u +'%Y-%m-%d %H:%M UTC')" \
            --body "Scheduled hourly run of the joker agent." \
            --assignee "Copilot"
