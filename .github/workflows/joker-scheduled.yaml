name: Joker Agent Scheduled Trigger

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  issues: write

jobs:
  trigger-joker-agent:
    name: Trigger joker agent
    runs-on: ubuntu-latest
    steps:
      - name: Ensure agent label exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh label list --repo "${{ github.repository }}" --json name --jq '.[].name' | grep -qx "copilot:agent=joker"; then
            gh label create "copilot:agent=joker" \
              --repo "${{ github.repository }}" \
              --description "Trigger the joker Copilot agent" \
              --color "6e40c9"
          fi

      - name: Create issue to trigger joker agent
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "Scheduled joker agent run - $(date -u '+%Y-%m-%d %H:%M UTC')" \
            --body "This issue was automatically created by the **Joker Agent Scheduled Trigger** workflow to invoke the joker agent on its hourly schedule." \
            --assignee "copilot" \
            --label "copilot:agent=joker"
