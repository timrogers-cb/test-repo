name: Joker Agent - Scheduled

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  trigger-joker-agent:
    name: Trigger joker agent
    runs-on: ubuntu-latest
    steps:
      - name: Create issue for joker agent
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "Scheduled joker agent run - $(date -u '+%Y-%m-%d %H:%M UTC')" \
            --body "This issue was automatically created by the **Joker Agent - Scheduled** workflow to trigger the joker agent on its hourly schedule." \
            --assignee "copilot"
