name: Joker Agent - Scheduled Hourly Trigger

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  issues: write

jobs:
  trigger-joker-agent:
    name: Trigger joker agent
    runs-on: ubuntu-latest
    steps:
      - name: Create issue to trigger joker agent
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "Scheduled run: joker agent ($(date -u '+%Y-%m-%d %H:%M UTC'))" \
            --body "This issue was automatically created by the **Joker Agent - Scheduled Hourly Trigger** workflow to trigger the joker agent on its hourly schedule." \
            --assignee "copilot"
