name: Joker (Scheduled)

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write
  models: read

jobs:
  run-joker-agent:
    name: Run joker agent
    runs-on: ubuntu-latest
    steps:
      - name: Run joker agent
        uses: github/copilot-coding-agent@v1
        with:
          agent: joker
          github-token: ${{ secrets.GITHUB_TOKEN }}
