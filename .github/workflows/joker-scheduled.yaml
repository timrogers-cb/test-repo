name: Joker Agent - Scheduled Hourly

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  issues: write

jobs:
  trigger-joker-agent:
    name: Trigger joker agent
    runs-on: ubuntu-latest
    steps:
      - name: Create issue to trigger joker agent
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "Scheduled joker run - $(date -u '+%Y-%m-%d %H:%M UTC')" \
            --body "Scheduled hourly trigger for the joker agent." \
            --assignee "copilot"
