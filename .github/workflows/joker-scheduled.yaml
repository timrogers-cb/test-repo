name: Joker (Scheduled)

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  run-joker-agent:
    name: Run joker agent
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Run joker agent
        uses: github/copilot-tasks@v1
        with:
          agent: joker
          github-token: ${{ secrets.GITHUB_TOKEN }}
