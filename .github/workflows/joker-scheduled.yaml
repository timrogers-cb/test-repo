name: Joker Agent (Scheduled)

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  run-joker-agent:
    name: Run joker agent
    runs-on: ubuntu-latest
    steps:
      - name: Run joker agent
        uses: github/copilot-agent@v1
        with:
          agent: joker
          github_token: ${{ secrets.GITHUB_TOKEN }}
