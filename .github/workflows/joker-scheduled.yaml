name: Run Joker Agent Hourly

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  run-joker:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: github/copilot-coding-agent@v1
        with:
          agent: joker
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
