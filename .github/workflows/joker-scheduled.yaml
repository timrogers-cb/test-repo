name: Joker (Scheduled)

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  run-joker-agent:
    name: Run joker agent
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Trigger joker agent
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "Scheduled joker run - $(date -u +'%Y-%m-%d %H:%M UTC')" \
            --body "@joker"
