name: Joker - Scheduled Run

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  run-joker:
    name: Run Joker agent
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Create issue to trigger Joker agent
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "Scheduled run: Joker agent ($(date -u '+%Y-%m-%d %H:%M UTC'))" \
            --body "@github-copilot joker" \
            --label "copilot"
