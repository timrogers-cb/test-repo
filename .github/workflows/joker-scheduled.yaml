name: Joker Agent - Scheduled Hourly Run

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  issues: write

jobs:
  trigger-joker-agent:
    name: Trigger joker agent
    runs-on: ubuntu-latest
    steps:
      - name: Create issue to trigger joker agent
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_URL=$(gh issue create \
            --repo "${{ github.repository }}" \
            --title "Scheduled joker agent run - $(date -u +'%Y-%m-%d %H:%M UTC')" \
            --body "@github-copilot joker" \
            --assignee "github-copilot[bot]")
          echo "issue_url=$ISSUE_URL" >> "$GITHUB_ENV"

      - name: Close issue after agent is triggered
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue close "${{ env.issue_url }}" \
            --repo "${{ github.repository }}" \
            --comment "Closed automatically after triggering the joker agent."
