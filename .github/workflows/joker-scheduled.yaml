name: Joker Agent - Hourly Schedule

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  trigger-joker-agent:
    name: Trigger Joker Agent
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Create issue to trigger Joker agent
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "Scheduled Joker Agent Run - $(date -u '+%Y-%m-%d %H:%M UTC')" \
            --body "This issue was automatically created by the hourly schedule to trigger the Joker agent." \
            --assignee "copilot" \
            --label "copilot"
