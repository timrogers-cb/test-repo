name: Joker (Scheduled)

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  run-joker-agent:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Trigger joker agent
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Scheduled joker run - ${new Date().toISOString()}`,
              body: '@github-copilot run\n\n<!-- copilot:agent=joker -->'
            });
