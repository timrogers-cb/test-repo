name: Scheduled Joker Agent

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  issues: write

jobs:
  trigger-joker:
    name: Trigger joker agent
    runs-on: ubuntu-latest
    steps:
      - name: Create issue to trigger joker agent
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "Scheduled joker agent run - $(date -u +'%Y-%m-%d %H:%M UTC')" \
            --body "This issue was automatically created by the **Scheduled Joker Agent** workflow to trigger the joker agent on its hourly schedule." \
            --assignee "copilot" \
            --label "copilot"
