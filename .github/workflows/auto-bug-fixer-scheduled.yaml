name: Auto Bug Fixer (Scheduled)

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  run-agent:
    name: Run auto-bug-fixer agent
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Run auto-bug-fixer agent
        uses: github/copilot-agent@v1
        with:
          agent: auto-bug-fixer
