name: Auto Bug Fixer (Scheduled)

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  trigger-auto-bug-fixer:
    name: Trigger auto-bug-fixer agent
    runs-on: ubuntu-latest
    steps:
      - name: Create issue to trigger auto-bug-fixer agent
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "Scheduled auto bug fix run ($(date -u '+%Y-%m-%d %H:%M UTC'))" \
            --body "This issue was automatically created by the **Auto Bug Fixer (Scheduled)** workflow.

@github-copilot Please run the auto-bug-fixer agent to scan the codebase for bugs and fix them." \
            --assignee "@me"
