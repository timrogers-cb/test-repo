name: Auto Bug Fixer - Scheduled

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  trigger-auto-bug-fixer:
    name: Trigger auto-bug-fixer agent
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Create issue to trigger auto-bug-fixer agent
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "Scheduled bug fix run - $(date -u '+%Y-%m-%d %H:%M UTC')" \
            --body "This issue was automatically created by the scheduled workflow to trigger the **auto-bug-fixer** agent.

The agent should scan the repository for bugs and open a pull request with any fixes." \
            --assignee "copilot" \
            --label "copilot"
