name: Auto Bug Fixer - Scheduled Run

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  issues: write

jobs:
  trigger-auto-bug-fixer:
    name: Trigger auto-bug-fixer agent
    runs-on: ubuntu-latest
    steps:
      - name: Create issue to trigger auto-bug-fixer agent
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "Scheduled auto bug fix run - $(date -u '+%Y-%m-%d %H:%M UTC')" \
            --body "This issue was automatically created by the scheduled workflow to trigger the auto-bug-fixer agent.

          The agent should scan the codebase for bugs and open a pull request with fixes." \
            --assignee "copilot"
