name: Auto Bug Fixer (Scheduled)

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  issues: write

jobs:
  trigger-auto-bug-fixer:
    name: Trigger auto-bug-fixer agent
    runs-on: ubuntu-latest
    steps:
      - name: Create issue for auto-bug-fixer agent
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "Scheduled: Auto Bug Fixer $(date -u +'%Y-%m-%d %H:00 UTC')" \
            --body "This issue was automatically created by the scheduled Auto Bug Fixer workflow to trigger a routine bug-fixing pass." \
            --assignee "copilot"
