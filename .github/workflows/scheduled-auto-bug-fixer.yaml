name: Scheduled Auto Bug Fixer

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  trigger-auto-bug-fixer:
    name: Trigger auto-bug-fixer agent
    runs-on: ubuntu-latest
    steps:
      - name: Create issue to trigger auto-bug-fixer agent
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BODY="This issue was automatically created by the **Scheduled Auto Bug Fixer** workflow to trigger the auto-bug-fixer agent.

          @copilot Please run the auto-bug-fixer agent to identify and fix any bugs in the codebase."

          gh issue create \
            --repo "${{ github.repository }}" \
            --title "Scheduled auto bug fix run: $(date -u '+%Y-%m-%d %H:%M UTC')" \
            --body "$BODY" \
            --label "copilot"
