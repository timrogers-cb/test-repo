name: Scheduled Auto Bug Fixer

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  trigger-auto-bug-fixer:
    name: Trigger auto-bug-fixer agent
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Trigger auto-bug-fixer agent
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "Scheduled auto bug fix run - $(date -u '+%Y-%m-%d %H:%M UTC')" \
            --body "This issue was automatically created by the **Scheduled Auto Bug Fixer** workflow to trigger the \`auto-bug-fixer\` agent on an hourly schedule." \
            --assignee "Copilot"
