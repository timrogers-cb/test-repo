name: Scheduled Auto-Bug-Fixer

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  trigger-auto-bug-fixer:
    name: Trigger auto-bug-fixer agent
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Create issue to trigger auto-bug-fixer agent
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BODY="This issue was automatically created by the scheduled workflow to trigger the auto-bug-fixer agent.

@github-copilot Please run the auto-bug-fixer agent to scan the codebase for bugs and fix them."

          gh issue create \
            --repo "${{ github.repository }}" \
            --title "Scheduled: auto-bug-fixer run $(date -u '+%Y-%m-%d %H:%M UTC')" \
            --body "$BODY"
