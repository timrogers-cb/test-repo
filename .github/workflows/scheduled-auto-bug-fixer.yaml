name: Scheduled Auto Bug Fixer

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  trigger-auto-bug-fixer:
    name: Trigger auto-bug-fixer agent
    runs-on: ubuntu-latest
    steps:
      - name: Trigger auto-bug-fixer agent
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Scheduled auto bug fix run - ${new Date().toISOString()}`,
              body: 'This issue was automatically created by the scheduled workflow to trigger the auto-bug-fixer agent.',
              assignees: ['copilot'],
              labels: ['automated'],
            });
