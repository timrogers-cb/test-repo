name: Scheduled Auto Bug Fixer

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  issues: write

jobs:
  trigger-agent:
    name: Trigger auto-bug-fixer agent
    runs-on: ubuntu-latest
    steps:
      - name: Create issue to trigger auto-bug-fixer agent
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "Scheduled auto bug fix run $(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --body "@github-copilot auto-bug-fixer" \
            --assignee "github-copilot[bot]"
