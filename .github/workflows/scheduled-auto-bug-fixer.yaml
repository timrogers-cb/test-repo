name: Scheduled Auto Bug Fixer

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  trigger-auto-bug-fixer:
    name: Trigger auto-bug-fixer agent
    runs-on: ubuntu-latest
    steps:
      - name: Create issue to invoke auto-bug-fixer agent
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "Scheduled auto bug fixer run: $(date -u +'%Y-%m-%d %H:%M UTC')" \
            --body "Scheduled hourly run of the auto-bug-fixer agent. Please analyze the codebase for bugs and fix any issues found." \
            --assignee "copilot" \
            --label "auto-bug-fixer"
