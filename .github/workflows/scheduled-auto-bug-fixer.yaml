name: Scheduled Auto Bug Fixer

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  trigger-auto-bug-fixer:
    name: Trigger auto-bug-fixer agent
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Trigger auto-bug-fixer agent
        uses: actions/github-script@v7
        with:
          script: |
            await github.request('POST /repos/{owner}/{repo}/copilot/agents/{agent_slug}/runs', {
              owner: context.repo.owner,
              repo: context.repo.repo,
              agent_slug: 'auto-bug-fixer',
            });
