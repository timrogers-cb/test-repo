name: Scheduled Auto Bug Fixer

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  run-auto-bug-fixer:
    name: Run auto-bug-fixer agent
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - name: Create issue to trigger auto-bug-fixer agent
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "Scheduled auto bug fix run – $(date -u '+%Y-%m-%d %H:%M UTC')" \
            --body "@copilot Please run the auto-bug-fixer agent to scan for and fix any bugs in the codebase."
