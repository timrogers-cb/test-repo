name: Scheduled Auto Bug Fixer

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  run-agent:
    name: Run auto-bug-fixer agent
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Run auto-bug-fixer agent
        uses: github/copilot-coding-agent@v1
        with:
          agent: auto-bug-fixer
          prompt: >
            Please review the codebase for any bugs, errors, or issues and fix them.
          github_token: ${{ secrets.GITHUB_TOKEN }}
