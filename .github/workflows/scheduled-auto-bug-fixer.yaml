name: Scheduled Auto Bug Fixer

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  auto-bug-fixer:
    name: Run auto-bug-fixer agent
    runs-on: ubuntu-latest
    steps:
      - name: Run auto-bug-fixer agent
        uses: github/copilot-coding-agent@v1
        with:
          agent: auto-bug-fixer
          github_token: ${{ secrets.GITHUB_TOKEN }}
