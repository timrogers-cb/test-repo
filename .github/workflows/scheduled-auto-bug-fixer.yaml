name: Scheduled Auto Bug Fixer

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  run-agent:
    name: Run auto-bug-fixer agent
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Run auto-bug-fixer agent
        uses: github/copilot-coding-agent@v1
        with:
          agent: auto-bug-fixer
          prompt: 'Scan the codebase for bugs and fix any issues found.'
          github-token: ${{ secrets.GITHUB_TOKEN }}
