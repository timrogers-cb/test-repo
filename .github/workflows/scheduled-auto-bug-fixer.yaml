name: Scheduled Auto Bug Fixer

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  run-agent:
    name: Run auto-bug-fixer agent
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Invoke auto-bug-fixer agent
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            /repos/${{ github.repository }}/copilot/agents/auto-bug-fixer/runs
