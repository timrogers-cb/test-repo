name: Joker Agent - Scheduled Hourly

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  trigger-joker-agent:
    name: Trigger joker agent
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Trigger joker agent
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            /repos/${{ github.repository }}/copilot/agents/joker/runs
