name: Joker Agent - Hourly Schedule

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  issues: write

jobs:
  run-joker-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger joker agent
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "Scheduled run: joker agent - $(date -u '+%Y-%m-%d %H:00 UTC')" \
            --body "@github-copilot run joker"
