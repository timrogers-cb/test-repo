name: Scheduled Joker Agent

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trigger-joker-agent:
    name: Trigger joker agent run
    runs-on: ubuntu-latest
    steps:
      - name: Trigger joker agent
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            /repos/${{ github.repository }}/copilot/agent-runs \
            -f agent_id="joker"
