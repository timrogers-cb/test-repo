name: Scheduled Joker Agent

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  issues: write

jobs:
  trigger-joker-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger joker agent
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "Scheduled joker agent run - $(date -u +'%Y-%m-%d %H:%M UTC')" \
            --body "Scheduled hourly run triggered by GitHub Actions." \
            --assignee "copilot"
