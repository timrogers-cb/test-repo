name: Joker Agent - Hourly Schedule

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  trigger-joker:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Run Joker Agent
        uses: github/copilot-coding-agent@v1
        with:
          agent: joker
          github_token: ${{ secrets.GITHUB_TOKEN }}
