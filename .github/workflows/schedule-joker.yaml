name: Scheduled Joker Agent

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  trigger-joker:
    name: Trigger joker agent
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Create issue to trigger joker agent
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --repo timrogers-cb/test-repo \
            --title "Scheduled run: joker agent ($(date -u '+%Y-%m-%d %H:%M UTC'))" \
            --body "@joker" \
            --label "copilot"
