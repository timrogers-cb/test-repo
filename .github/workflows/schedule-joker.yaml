name: Scheduled Joker Agent

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  trigger-joker:
    name: Trigger joker agent
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Create issue to trigger joker agent
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "Scheduled joker agent run - $(date -u '+%Y-%m-%d %H:%M UTC')" \
            --body "Scheduled hourly run of the joker agent." \
            --assignee "github-copilot[bot]" \
            --label "copilot:agent=joker"
