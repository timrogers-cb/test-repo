name: Run Joker Agent (Scheduled)

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  run-joker:
    name: Run joker agent
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Trigger joker agent
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "Scheduled joker run - $(date -u '+%Y-%m-%d %H:%M UTC')" \
            --body "This issue was automatically created by the **Run Joker Agent (Scheduled)** workflow to trigger the joker agent on an hourly schedule." \
            --assignee "github-copilot[bot]"
